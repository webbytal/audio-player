<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100dvh; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
  .player { width: 90%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  .visualizer { display: flex; align-items: flex-end; justify-content: center; gap: 4px; height: 120px; width: 100%; }
  .bar { width: 6px; border-radius: 3px; background: linear-gradient(to top, #6366f1, #a78bfa); height: 8px; transition: height 0.12s ease; }
  .play-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: linear-gradient(135deg, #6366f1, #8b5cf6); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(99, 102, 241, 0.35); transition: transform 0.15s ease, box-shadow 0.15s ease; flex-shrink: 0; }
  .play-btn:hover { transform: scale(1.08); box-shadow: 0 0 60px rgba(99, 102, 241, 0.5); }
  .play-btn:active { transform: scale(0.96); }
  .play-btn svg { width: 32px; height: 32px; fill: #fff; }
  .time-row { width: 100%; display: flex; justify-content: space-between; font-size: 13px; color: #888; font-variant-numeric: tabular-nums; margin-bottom: -20px; }
  .progress-wrap { width: 100%; height: 6px; background: #1e1e2e; border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
  .progress-wrap:hover { height: 10px; }
  .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #a78bfa); border-radius: 3px; transition: width 0.1s linear; }
  .track-title { font-size: 14px; color: #555; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }
</style>
</head>
<body>
<div class="player">
  <div class="track-title">Now Playing</div>
  <div class="visualizer" id="visualizer"></div>
  <button class="play-btn" id="playBtn" aria-label="Play or pause">
    <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
    <svg id="iconPause" viewBox="0 0 24 24" style="display:none">
      <rect x="5" y="3" width="4" height="18" rx="1"/>
      <rect x="15" y="3" width="4" height="18" rx="1"/>
    </svg>
  </button>
  <div class="time-row">
    <span id="timeCurrent">0:00</span>
    <span id="timeDuration">0:00</span>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>
<script>
(function() {
  const audio = new Audio('audio.mp3');
  audio.preload = 'metadata';
  const playBtn = document.getElementById('playBtn');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const timeCurrent = document.getElementById('timeCurrent');
  const timeDuration = document.getElementById('timeDuration');
  const vizContainer = document.getElementById('visualizer');
  const BAR_COUNT = 40;
  const bars = [];
  for (let i = 0; i < BAR_COUNT; i++) { const bar = document.createElement('div'); bar.className = 'bar'; vizContainer.appendChild(bar); bars.push(bar); }
  let audioCtx, analyser, source, dataArray, connected = false;
  function initAudio() { if (connected) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 128; source = audioCtx.createMediaElementSource(audio); source.connect(analyser); analyser.connect(audioCtx.destination); dataArray = new Uint8Array(analyser.frequencyBinCount); connected = true; }
  let animId;
  function animateBars() { if (!analyser) return; analyser.getByteFrequencyData(dataArray); const step = Math.floor(dataArray.length / BAR_COUNT); for (let i = 0; i < BAR_COUNT; i++) { const val = dataArray[i * step] || 0; const h = 8 + (val / 255) * 112; bars[i].style.height = h + 'px'; } animId = requestAnimationFrame(animateBars); }
  function resetBars() { cancelAnimationFrame(animId); bars.forEach(b => b.style.height = '8px'); }
  function fmt(s) { if (isNaN(s)) return '0:00'; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }
  let playing = false;
  playBtn.addEventListener('click', () => { if (!connected) initAudio(); if (playing) { audio.pause(); iconPlay.style.display = ''; iconPause.style.display = 'none'; resetBars(); } else { audio.play(); iconPlay.style.display = 'none'; iconPause.style.display = ''; animateBars(); } playing = !playing; });
  audio.addEventListener('timeupdate', () => { if (!audio.duration) return; progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%'; timeCurrent.textContent = fmt(audio.currentTime); });
  audio.addEventListener('loadedmetadata', () => { timeDuration.textContent = fmt(audio.duration); });
  progressWrap.addEventListener('click', (e) => { const rect = progressWrap.getBoundingClientRect(); const pct = (e.clientX - rect.left) / rect.width; audio.currentTime = pct * audio.duration; });
  audio.addEventListener('ended', () => { playing = false; iconPlay.style.display = ''; iconPause.style.display = 'none'; resetBars(); progressFill.style.width = '0%'; });
})();
</script>
</body>
</html>
