<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Joe Tal's Bridge Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --felt: #1a5c3a;
    --felt-dark: #0f3d26;
    --felt-deep: #092015;
    --gold: #c9a84c;
    --gold-light: #e4c870;
    --cream: #f5f0e1;
    --red-suit: #c0392b;
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(201, 168, 76, 0.25);
    --card-hover: rgba(201, 168, 76, 0.18);
    --card-active: rgba(201, 168, 76, 0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Heebo', 'Inter', sans-serif;
    background: radial-gradient(ellipse at top, var(--felt) 0%, var(--felt-dark) 45%, var(--felt-deep) 100%);
    color: var(--cream);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    direction: rtl;
  }
  .top-bar {
    flex: 0 0 auto;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(201, 168, 76, 0.18);
    min-height: 58px;
  }
  .back-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(201, 168, 76, 0.15);
    border: 1px solid rgba(201, 168, 76, 0.35);
    color: var(--gold-light);
    cursor: pointer;
    font-size: 22px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto;
    transition: background 0.15s;
    padding: 0;
  }
  .back-btn:hover { background: rgba(201, 168, 76, 0.28); }
  .back-btn.hidden { display: none; }
  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    color: var(--gold-light);
    font-size: clamp(15px, 1.8vw, 19px);
    white-space: nowrap;
  }
  .breadcrumb {
    font-size: clamp(13px, 1.5vw, 16px);
    color: rgba(245, 240, 225, 0.75);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .player { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .play-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--gold); border: 0; color: #222;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto; padding: 0;
  }
  .play-btn:disabled { opacity: 0.35; cursor: default; }
  .play-btn svg { width: 18px; height: 18px; }
  .player-info { flex: 1; min-width: 0; }
  .player-title {
    font-size: 13px; color: var(--cream);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .progress-bar { height: 4px; background: rgba(255, 255, 255, 0.12); border-radius: 2px; overflow: hidden; cursor: pointer; }
  .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.1s linear; }
  .time { font-size: 12px; color: rgba(245, 240, 225, 0.6); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .grid-wrap { flex: 1 1 auto; padding: 16px; min-height: 0; display: flex; }
  .grid {
    flex: 1;
    display: grid;
    gap: 14px;
    min-height: 0;
    width: 100%;
  }
  .menu-card, .term-card {
    background: linear-gradient(135deg, var(--card-bg), rgba(255,255,255,0.02));
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    padding: 18px;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
    font-family: 'Heebo', sans-serif;
    color: var(--cream);
    user-select: none;
    min-height: 0;
  }
  .menu-card { font-size: clamp(18px, 2.6vw, 28px); font-weight: 600; }
  .term-card { font-size: clamp(14px, 1.7vw, 19px); font-weight: 500; }
  .menu-card:hover, .term-card:hover {
    background: var(--card-hover);
    border-color: var(--gold);
    transform: translateY(-1px);
  }
  .menu-card.generic-card {
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.12), rgba(201, 168, 76, 0.04));
    border-color: rgba(201, 168, 76, 0.45);
    grid-column: 1 / -1;
    font-size: clamp(15px, 1.8vw, 20px);
  }
  .term-card.active { background: var(--card-active); border-color: var(--gold); }
  .suit {
    position: absolute; top: 8px; left: 8px;
    font-size: 14px; color: var(--gold); opacity: 0.7;
  }
  .suit.red { color: var(--red-suit); }
  .empty-note {
    grid-column: 1 / -1;
    align-self: center; justify-self: center;
    color: rgba(245, 240, 225, 0.55);
    font-size: 16px; text-align: center;
    padding: 30px;
  }
  @media (max-width: 760px) {
    .top-bar { padding: 8px 12px; gap: 10px; min-height: 52px; }
    .time { display: none; }
    .grid-wrap { padding: 10px; }
    .grid { gap: 10px; }
  }
  @media (max-width: 380px) {
    .brand { display: none; }
  }
</style>
</head>

<div class="top-bar">

    'table-rules/t4/b': audioPage('כללים לשולחן › נושא 4 › סוג ב', 'table-rules/t4'),
    'table-rules/t4/c': audioPage('כללים לשולחן › נושא 4 › סוג ג', 'table-rules/t4'),

    // ============== GENERIC TERMS (existing 20) ==============
    'generic': {
      title: 'מונחים כלליים',
      type: 'audio',
      parent: 'main',
      topics: GENERIC_TOPICS
    }
  };

  // ============ ROUTER ============
  function getRoute() {
    return decodeURIComponent(location.hash.replace(/^#\/?/, '')) || 'main';
  }
  function navigate(route) { location.hash = '#/' + route; }
  window.addEventListener('hashchange', render);
  window.addEventListener('DOMContentLoaded', render);

  // ============ RENDER ============
  const grid = document.getElementById('grid');
  const breadcrumb = document.getElementById('breadcrumb');
  const backBtn = document.getElementById('back-btn');
  const player = document.getElementById('player');
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const progressFill = document.getElementById('progress-fill');
  const progressBar = document.getElementById('progress-bar');
  const playerTitle = document.getElementById('player-title');
  const currentTimeEl = document.getElementById('current-time');
  const durationEl = document.getElementById('duration');

  const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  let currentTopicIndex = -1;

  backBtn.addEventListener('click', () => {
    const route = getRoute();
    const screen = SCREENS[route];
    if (screen && screen.parent) navigate(screen.parent);
    else navigate('main');
  });

  function render() {
    const route = getRoute();
    const screen = SCREENS[route];

    if (!screen) { navigate('main'); return; }

    // pause any playing audio on navigation
    audio.pause();
    audio.removeAttribute('src');
    currentTopicIndex = -1;
    playerTitle.textContent = 'בחר נושא למטה';
    progressFill.style.width = '0%';
    currentTimeEl.textContent = '0:00';
    durationEl.textContent = '0:00';
    playBtn.disabled = true;
    playIcon.innerHTML = PLAY_SVG;

    breadcrumb.textContent = screen.title || '';
    backBtn.classList.toggle('hidden', route === 'main');

    player.style.display = screen.type === 'audio' ? 'flex' : 'none';

    grid.innerHTML = '';
    grid.style.gridTemplateColumns = '';
    grid.style.gridTemplateRows = '';

    if (screen.type === 'menu') renderMenu(screen);
    else renderAudio(screen);
  }

  function renderMenu(screen) {
    const buttons = screen.buttons;
    const n = buttons.length;
    const isMobile = window.innerWidth <= 760;

    // decide columns/rows
    let cols, rows;
    if (n === 3) { cols = isMobile ? 1 : 3; rows = isMobile ? 3 : 1; }
    else if (n === 4) { cols = 2; rows = 2; }
    else if (n === 7) { cols = 2; rows = 4; } // 6 section buttons + 1 generic spanning the last row
    else if (n === 6) { cols = 2; rows = 3; }
    else { cols = Math.min(n, 2); rows = Math.ceil(n / cols); }

    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

    buttons.forEach(btn => {
      const card = document.createElement('div');
      card.className = 'menu-card';
      if (btn.generic) card.classList.add('generic-card');
      card.textContent = btn.label;
      card.addEventListener('click', () => navigate(btn.nav));
      grid.appendChild(card);
    });
  }

  function renderAudio(screen) {
    const topics = screen.topics || [];

    if (topics.length === 0) {
      const note = document.createElement('div');
      note.className = 'empty-note';
      note.innerHTML = 'אין עדיין תוכן בעמוד זה.<br><small style="opacity:0.75">כאן יופיעו כפתורי האודיו.</small>';
      grid.appendChild(note);
      return;
    }

    const n = topics.length;
    const isMobile = window.innerWidth <= 760;

    let cols, rows;
    if (n <= 4) { cols = 2; rows = Math.ceil(n / 2); }
    else if (n <= 6) { cols = 3; rows = 2; }
    else if (n <= 12) { cols = isMobile ? 3 : 4; rows = Math.ceil(n / cols); }
    else { cols = isMobile ? 4 : 5; rows = Math.ceil(n / cols); }

    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

    topics.forEach((topic, idx) => {
      const card = document.createElement('div');
      card.className = 'term-card';
      card.dataset.index = idx;
      if (topic.suit) {
        card.innerHTML = '<span class="suit ' + (topic.red ? 'red' : '') + '">' + topic.suit + '</span>' + topic.label;
      } else {
        card.textContent = topic.label;
      }
      card.addEventListener('click', () => selectTopic(idx, screen));
      grid.appendChild(card);
    });
  }

  function selectTopic(idx, screen) {
    const topic = screen.topics[idx];
    currentTopicIndex = idx;
    document.querySelectorAll('.term-card').forEach((c, i) => c.classList.toggle('active', i === idx));
    playerTitle.textContent = topic.label;
    audio.src = 'audio/' + topic.file;
    playBtn.disabled = false;
    audio.play().catch(err => console.log('Play blocked:', err));
  }

  // ============ AUDIO EVENTS ============
  playBtn.addEventListener('click', () => {
    if (currentTopicIndex === -1) return;
    if (audio.paused) audio.play();
    else audio.pause();
  });
  audio.addEventListener('play', () => { playIcon.innerHTML = PAUSE_SVG; playBtn.setAttribute('aria-label', 'השהה'); });
  audio.addEventListener('pause', () => { playIcon.innerHTML = PLAY_SVG; playBtn.setAttribute('aria-label', 'נגן'); });
  audio.addEventListener('ended', () => {
    playIcon.innerHTML = PLAY_SVG;
    progressFill.style.width = '0%';
    currentTimeEl.textContent = '0:00';
  });
  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
    }
  });
  audio.addEventListener('loadedmetadata', () => { durationEl.textContent = formatTime(audio.duration); });
  audio.addEventListener('error', () => {
    if (currentTopicIndex !== -1) {
      const route = getRoute();
      const screen = SCREENS[route];
      if (screen && screen.topics[currentTopicIndex]) {
        playerTitle.textContent = screen.topics[currentTopicIndex].label + ' (אודיו לא נמצא)';
      }
    }
  });
  progressBar.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    // in RTL, clicking right=0%, left=100%
    const pct = 1 - (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  function formatTime(t) {
    if (!isFinite(t)) return '0:00';
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60).toString().padStart(2, '0');
    return m + ':' + s;
  }

  // rerender on resize to adjust grid columns for mobile
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 150);
  });
</script>

<head>

<style>
  :root {

  html, body {

  .progress-fill {

  }

  .time {
    font-size: 11px;

    flex-shrink: 0;

  }

    justify-content: center;

  }

  .term-card:hover {

  @media (max-width: 760px) {

      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);

    }

      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }
  }

    { name: 'Endplay',       file: 'endplay.mp3',       suit: '\u2663', red: false },
    { name: 'Ruff',          file: 'ruff.mp3',          suit: '\u2660', red: false },
    { name: 'Overtrick',     file: 'overtrick.mp3',     suit: '\u2665', red: true  },
    { name: 'Contract',      file: 'contract.mp3',      suit: '\u2666', red: true  },
    { name: 'Vulnerability', file: 'vulnerability.mp3', suit: '\u2663', red: false },
    { name: 'Convention',    file: 'convention.mp3',    suit: '\u2660', red: false },
    { name: 'Double',        file: 'double.mp3',        suit: '\u2665', red: true  },
    { name: 'Redouble',      file: 'redouble.mp3',      suit: '\u2666', red: true  },
    { name: 'Rubber',        file: 'rubber.mp3',        suit: '\u2663', red: false }
  ];

  const grid = document.getElementById('terms-grid');
  TERMS.forEach(function (term, idx) {
    const card = document.createElement('div');
    card.className = 'term-card';
    card.dataset.index = idx;
    card.innerHTML = '<span class="suit ' + (term.red ? 'red' : '') + '">' + term.suit + '</span>' + term.name;
    card.addEventListener('click', function () { selectTerm(idx); });
    grid.appendChild(card);
  });

  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const currentTimeEl = document.getElementById('current-time');
  const durationEl = document.getElementById('duration');
  const playerTitle = document.getElementById('player-title');

  const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

  let currentIndex = -1;

  function formatTime(t) {
    if (!isFinite(t)) return '0:00';
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60).toString().padStart(2, '0');
    return m + ':' + s;
  }

  function selectTerm(idx) {
    const term = TERMS[idx];
    currentIndex = idx;

    document.querySelectorAll('.term-card').forEach(function (c, i) {
      c.classList.toggle('active', i === idx);
    });

    playerTitle.textContent = term.name;
    audio.src = 'audio/' + term.file;
    playBtn.disabled = false;

    audio.play().catch(function (err) { console.log('Play blocked:', err); });
  }

  playBtn.addEventListener('click', function () {
    if (currentIndex === -1) return;
    if (audio.paused) audio.play();
    else audio.pause();
  });

  audio.addEventListener('play', function () {
    playIcon.innerHTML = PAUSE_SVG;
    playBtn.setAttribute('aria-label', 'Pause');
  });

  audio.addEventListener('pause', function () {
    playIcon.innerHTML = PLAY_SVG;
    playBtn.setAttribute('aria-label', 'Play');
  });

  audio.addEventListener('ended', function () {
    playIcon.innerHTML = PLAY_SVG;
    progressFill.style.width = '0%';
    currentTimeEl.textContent = '0:00';
  });

  audio.addEventListener('timeupdate', function () {
    if (audio.duration) {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
    }
  });

  audio.addEventListener('loadedmetadata', function () {
    durationEl.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('error', function () {
    if (currentIndex !== -1) {
      playerTitle.textContent = TERMS[currentIndex].name + ' (audio not found)';
    }
  });

  progressBar.addEventListener('click', function (e) {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });
</script>

</body>
</html>
