<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Joe Tal's Bridge Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --felt: #1a5c3a;
    --felt-dark: #0f3d26;
    --felt-deep: #092015;
    --gold: #c9a84c;
    --gold-light: #e4c870;
    --cream: #f5f0e1;
    --red-suit: #c0392b;
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(201, 168, 76, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(ellipse at top, var(--felt) 0%, var(--felt-dark) 45%, var(--felt-deep) 100%);
    color: var(--cream);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  .top-bar {
    flex: 0 0 auto;
    padding: 10px 18px;
    background: rgba(9, 32, 21, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .brand-suits { font-size: 13px; letter-spacing: 2px; }
  .brand-suits .red { color: var(--red-suit); }
  .brand-suits .black { color: var(--cream); }

  .player {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .play-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: var(--felt-deep);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
    box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
  }

  .play-btn:hover:not(:disabled) { transform: scale(1.08); }
  .play-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
  .play-btn svg { width: 14px; height: 14px; }

  .player-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .player-title {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.9;
  }

  .progress-bar {
    height: 3px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 2px;
    cursor: pointer;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.1s linear;
  }

  .time {
    font-size: 11px;
    opacity: 0.6;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    min-width: 72px;
    text-align: right;
  }

  .grid-wrap {
    flex: 1 1 auto;
    padding: 14px;
    min-height: 0;
    display: flex;
  }

  .terms-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
    min-height: 0;
  }

  .term-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px;
    font-family: 'Playfair Display', serif;
    font-size: clamp(14px, 1.5vw, 20px);
    font-weight: 700;
    color: var(--cream);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    line-height: 1.15;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .term-card:hover {
    border-color: var(--gold);
    background: rgba(201, 168, 76, 0.12);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
  }

  .term-card:active { transform: translateY(0); }

  .term-card.active {
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.28), rgba(201, 168, 76, 0.1));
    border-color: var(--gold);
    box-shadow: 0 0 0 2px var(--gold), 0 6px 18px rgba(201, 168, 76, 0.25);
  }

  .term-card .suit {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 10px;
    opacity: 0.45;
  }

  .term-card .suit.red { color: var(--red-suit); }

  @media (max-width: 760px) {
    .top-bar {
      padding: 8px 12px;
      gap: 10px;
    }
    .brand { font-size: 14px; }
    .brand-suits { display: none; }
    .player-title { font-size: 12px; }
    .time { display: none; }
    .terms-grid {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 8px;
    }
    .grid-wrap { padding: 10px; }
    .term-card {
      font-size: clamp(11px, 3.2vw, 16px);
      padding: 6px 4px;
      border-radius: 8px;
      line-height: 1.1;
    }
    .term-card .suit { font-size: 9px; top: 4px; right: 5px; }
  }

  @media (max-width: 380px) {
    .brand { display: none; }
    .top-bar { gap: 8px; }
  }

  @media (max-height: 480px) and (orientation: landscape) {
    .terms-grid {
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">
    <span class="brand-suits"><span class="black">&spades;</span><span class="red">&hearts;</span><span class="red">&diams;</span><span class="black">&clubs;</span></span>
    Joe Tal's Bridge Helper
  </div>
  <div class="player">
    <button class="play-btn" id="play-btn" disabled aria-label="Play">
      <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="player-info">
      <div class="player-title" id="player-title">Tap a term below</div>
      <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="time"><span id="current-time">0:00</span> / <span id="duration">0:00</span></div>
  </div>
</div>

<div class="grid-wrap">
  <div class="terms-grid" id="terms-grid"></div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
  const TERMS = [
    { name: 'Bidding',       file: 'bidding.mp3',       suit: '\u2660', red: false },
    { name: 'Opening Lead',  file: 'opening-lead.mp3',  suit: '\u2665', red: true  },
    { name: 'Dummy',         file: 'dummy.mp3',         suit: '\u2666', red: true  },
    { name: 'Declarer',      file: 'declarer.mp3',      suit: '\u2663', red: false },
    { name: 'Finesse',       file: 'finesse.mp3',       suit: '\u2660', red: false },
    { name: 'Slam',          file: 'slam.mp3',          suit: '\u2665', red: true  },
    { name: 'Trump',         file: 'trump.mp3',         suit: '\u2666', red: true  },
    { name: 'No Trump',      file: 'no-trump.mp3',      suit: '\u2663', red: false },
    { name: 'Hand Play',     file: 'hand-play.mp3',     suit: '\u2660', red: false },
    { name: 'Defense',       file: 'defense.mp3',       suit: '\u2665', red: true  },
    { name: 'Squeeze',       file: 'squeeze.mp3',       suit: '\u2666', red: true  },
    { name: 'Endplay',       file: 'endplay.mp3',       suit: '\u2663', red: false },
    { name: 'Ruff',          file: 'ruff.mp3',          suit: '\u2660', red: false },
    { name: 'Overtrick',     file: 'overtrick.mp3',     suit: '\u2665', red: true  },
    { name: 'Contract',      file: 'contract.mp3',      suit: '\u2666', red: true  },
    { name: 'Vulnerability', file: 'vulnerability.mp3', suit: '\u2663', red: false },
    { name: 'Convention',    file: 'convention.mp3',    suit: '\u2660', red: false },
    { name: 'Double',        file: 'double.mp3',        suit: '\u2665', red: true  },
    { name: 'Redouble',      file: 'redouble.mp3',      suit: '\u2666', red: true  },
    { name: 'Rubber',        file: 'rubber.mp3',        suit: '\u2663', red: false }
  ];

  const grid = document.getElementById('terms-grid');
  TERMS.forEach(function (term, idx) {
    const card = document.createElement('div');
    card.className = 'term-card';
    card.dataset.index = idx;
    card.innerHTML = '<span class="suit ' + (term.red ? 'red' : '') + '">' + term.suit + '</span>' + term.name;
    card.addEventListener('click', function () { selectTerm(idx); });
    grid.appendChild(card);
  });

  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const currentTimeEl = document.getElementById('current-time');
  const durationEl = document.getElementById('duration');
  const playerTitle = document.getElementById('player-title');

  const PLAY_SVG = '<path d="M8 5v14l11-7z"/>';
  const PAUSE_SVG = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

  let currentIndex = -1;

  function formatTime(t) {
    if (!isFinite(t)) return '0:00';
    const m = Math.floor(t / 60);
    const s = Math.floor(t % 60).toString().padStart(2, '0');
    return m + ':' + s;
  }

  function selectTerm(idx) {
    const term = TERMS[idx];
    currentIndex = idx;

    document.querySelectorAll('.term-card').forEach(function (c, i) {
      c.classList.toggle('active', i === idx);
    });

    playerTitle.textContent = term.name;
    audio.src = 'audio/' + term.file;
    playBtn.disabled = false;

    audio.play().catch(function (err) { console.log('Play blocked:', err); });
  }

  playBtn.addEventListener('click', function () {
    if (currentIndex === -1) return;
    if (audio.paused) audio.play();
    else audio.pause();
  });

  audio.addEventListener('play', function () {
    playIcon.innerHTML = PAUSE_SVG;
    playBtn.setAttribute('aria-label', 'Pause');
  });

  audio.addEventListener('pause', function () {
    playIcon.innerHTML = PLAY_SVG;
    playBtn.setAttribute('aria-label', 'Play');
  });

  audio.addEventListener('ended', function () {
    playIcon.innerHTML = PLAY_SVG;
    progressFill.style.width = '0%';
    currentTimeEl.textContent = '0:00';
  });

  audio.addEventListener('timeupdate', function () {
    if (audio.duration) {
      progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
    }
  });

  audio.addEventListener('loadedmetadata', function () {
    durationEl.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('error', function () {
    if (currentIndex !== -1) {
      playerTitle.textContent = TERMS[currentIndex].name + ' (audio not found)';
    }
  });

  progressBar.addEventListener('click', function (e) {
    if (!audio.duration) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });
</script>

</body>
</html>
